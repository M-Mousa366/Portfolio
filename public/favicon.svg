<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <!-- Dark mode gradient (default) -->
    <linearGradient id="gd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c8f0"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Hexagon frame -->
  <polygon
    points="24,3 43,13.5 43,34.5 24,45 5,34.5 5,13.5"
    fill="none"
    stroke="url(#gd)"
    stroke-width="2"
  />

  <!-- Inner subtle hex ring -->
  <polygon
    points="24,8 39,16.5 39,31.5 24,40 9,31.5 9,16.5"
    fill="#0c1220"
    stroke="url(#gd)"
    stroke-width="0.75"
    stroke-opacity="0.35"
  />

  <!-- MM letterform — left M -->
  <path
    d="M10 32 L10 16 L16.5 25 L23 16 L23 32"
    fill="none"
    stroke="url(#gd)"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- MM letterform — right M -->
  <path
    d="M25 32 L25 16 L31.5 25 L38 16 L38 32"
    fill="none"
    stroke="url(#gd)"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
