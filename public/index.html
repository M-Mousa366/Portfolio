<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Mohamed Adel Mousa — Cybersecurity & IT Infrastructure Engineer. SOC operations, network engineering, and threat detection." />
    <title>Mohamed Mousa | Cybersecurity Engineer</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.svg" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#070d1a" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f7fb" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />
</head>

<body>
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('portfolio-theme');
          var preferred = saved
            ? saved
            : window.matchMedia('(prefers-color-scheme: light)').matches
            ? 'light'
            : 'dark';
          document.documentElement.setAttribute('data-theme', preferred);
        } catch(e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
</body>

</html>
